<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arrays y Bucles for</title>
</head>
<body>
    <button onclick="alineacion()">Alineación</button>
    <button onclick="factorial()">Factorial</button>
    <button onclick="tablaMultiplicar()">Tabla de Multiplicación</button>
    <button onclick="imprimeAlineacion()">Imprime Alineación</button>
    <script type="text/javascript">
        function tablaMultiplicar() {
            let numero = prompt("Dime un número y hayo su tabla de multiplicar");
            document.write("<h1>Tabla del " + numero + "</h1>");
            document.write("<table border='1'>");
            for (let i=1; i<=10; i++){
                document.write("<tr><td>" + numero + " x " + i + "</td><td>" + numero*i + "</td></tr>");
            }
            document.write("</table>");
        }
        function factorial(){
            let numero = prompt("Dime un número que le calculo el factor");
            let factorial = 1;
            for (let i=1; i<=numero ; i++){
                factorial = factorial*i;
            }
            alert("El factorial de " + numero + " es " + factorial);
        }
        function alineacion() {
            var alineacion = ['Benzema', 'Bale', 'Marcelo' , 'Sergio R.', 'Griezmann', 'Julian Alvarez'];
            alineacion [6]= "Casemiro";
            let posicion = prompt("Dime posición: ")
            alert(alineacion[posicion]);
        }
        function imprimeAlineacion() {
            var alineacion = ['Benzema', 'Bale', 'Marcelo' , 'Sergio R.', 'Griezmann', 'Julian Alvarez'];
            alineacion [6]= "Casemiro";
            for (let i=0; i<alineacion.length; i++){
                document.write( i + " " + alineacion[i] + "<br>");
            }
        }
    </script>
    <br>
    <a href="index.html">Volver a inicio</a>
</body>
</html>
