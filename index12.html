<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <!-- JS y DOM: Validadción de formularios III -->
    <title>Validación de Formularios IV (comparar fecha de hoy)</title>
    <style type="text/css">
        *{font-family:arial; 
        box-sizing: border-box;}
        #aviso {
            color:red;
            text-align: center;
            margin: 0;
            padding: 0;
        }
        #capaformulario {
            height: auto;
            background-color: grey;
            border-radius: 15px;
            width: 80%;
            margin: auto;
            padding: 20px;
        }
        label {
            color: white;
            display: inline-block;
            width: 30%;}
        input{
            width: 70%;
            height: 25px;
            border: 1px solid white ;
            border-radius: 4px;
        }   

    </style>
    <script>
        function validaFormulario() {
            var aviso = document.getElementById("aviso");
            var nombre = document.getElementById("nombre");
            
            if (nombre.value.length == 0) {
                aviso.innerHTML = "**El nombre no puede estar vacio**";
                nombre.focus();
                return false; // Evita que se envíe el formulario
            }
            var fecha = document.getElementById("fecha");
            //alert(fecha.value);
            if(fecha.value.length == 0){
                aviso.innerHTML = "**La fecha no puede estar vacia**";
                nombre.focus();
                return false; // Evita que se envíe el formulario
            }
            var fechaHoy = new Date();
            var fechaHoyStr = fechaHoy.toISOString();
            fechaHoyStr = fechaHoyStr.slice(0,10);
            alert(fechaHoyStr);
            if(fecha.value < fechaHoyStr){
                aviso.innerHTML = "**La fecha no puede ser anterior a la fecha de hoy**";
                nombre.focus();
                return false; 
            }
            return true; // Permite que se envíe el formulario
        }
    </script>
<body>
    <h1 id="titulo">Formulario de inscripción</h1>
    <div id="capaformulario">
        <form action="procesa.php" onsubmit="return validaFormulario()">
        <label for="nombre">Nombre</label>
        <input type="text" name="nombre" id="nombre">
        <br>
        <label for="fecha">Fecha de Inscripción</label>
        <input type="date" name="fecha" id="fecha">
        <br>
        <div style="text-align: center; margin-top: 20px;">
        <input type="submit" name="submint" id="submit">
        </div>
    </div> 
    </form>  
    </div>
<h6 id="aviso"></h6>
<br>
    <a href="index.html">Volver a inicio</a>
</body>
</html>
