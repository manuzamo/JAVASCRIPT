    <script>
        
        /*pide un nombre por pantalla*/
        var nombre = prompt("Por favor, ingresa tu nombre:");
        /* + sirve para sumar pero tambien para concatenar cadenas */
        alert("Bienvenido a mi página " + nombre);
        /*Declaración de variables*/
        let x = 5;
        let y = 6;
        let z = x + y;
        alert("z:" + z);
        let edad = prompt("¿Cuál es tu edad?");
        let mensaje = "";
        if (edad <= 18) {
            mensaje = "No puedes acceder a esta página";
        } else {
            mensaje = "Bienvenido a esta página";
        }
        alert(mensaje); 
    </script>
