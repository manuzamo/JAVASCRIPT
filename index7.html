<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript y el DOM 2ª parte</title>
    <style type="text/css">
        .importante{
            background-color: red;
            color: yellow;
            font-size: 30px;
        }
    </style>
    

    <script type="text/javascript">
        function aplicarClase() {
            document.getElementById("titulo").className = "importante"
        }
    </script>

</head>
<body>
    <h1 id="titulo">Título inicial</h1>
    <button onclick="aplicarClase()">Aplicar Clase</button>
    <br>
    <a href="index.html">Volver a inicio</a>
</body>
</html>
