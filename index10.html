<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- JavaScript y el DOM 5: Validación de Formularios1 -->
    <title>Validación de Formularios</title>
    <script type="text/javascript">
        function validaFormulario() {
            var nombre = document.getElementById("nombre");
            if (nombre.value.length == 0) {
                alert("El nombre no puede estar vacio");
                return false; // Evita que se envíe el formulario
            }
            var edad = document.getElementById("edad");
            if (parseInt(edad.value)<18) {
                alert("La edad no puede ser menor que 18");
                return false; // Evita que se envíe el formulario
            }
            alert("Dato correctos, procedo a enviar el formulario");
            return true; // Permite que se envíe el formulario
        }
    </script>
</head>
<body>
    <h1>Formulario de envío</h1>
    <form action="procesa.php" onsubmit="return validaFormulario()">
    <label for="nombre">Nombre:</label>
    <input type="text" name="nombre" id="nombre"><br>
    <label for="edad">Edad:</label>
    <input type="text" name="edad" id="edad">
    <input type="submit" value="Enviar Datos" name="">
    </form>
    <br>
    <a href="index.html">Volver a inicio</a>
</body>
</html>
