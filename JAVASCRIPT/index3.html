<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suma de números</title>
</head>
<body>
    <script>
        function parImpar(num) {
            if (num % 2 == 0) {
                return "par";
            } else {
                return "impar";
            }
        }
        function diceImpar() {
            let numero = parseInt(prompt("Introduce un número:"));
            let resultado = parImpar(numero);
            alert("El número " + numero + " es " + resultado);
        }
        function sumaNumeros() {      
        let numero1 = parseInt (prompt("Introduce el primer número:"));
        let numero2 =  parseInt(prompt("Introduce el segundo número:"));
        let suma = numero1 + numero2;
        alert("La suma de " + numero1 + " y " + numero2 + " es: " + suma);
    }
    </script>
    <button onclick="sumaNumeros()">Sumar dos números</button>
    <button onclick="diceImpar()">Verificar si es par o impar</button>

    <br>
    <a href="index.html">Volver a inicio</a>
</body>
</html>
