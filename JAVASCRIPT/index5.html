<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nota Media</title>
</head>
<body>
    <button onclick="notamedia()">Media</button>
    <script type="text/javascript">
        function notamedia() {
            let numNotas = parseInt(prompt("¿Cuántas notas quieres introducir?"));
            let suma = 0;
            let nota;
            for (let i=1; i<=numNotas; i++){
                nota = parseInt(prompt("Dime una nota:"));
                suma = suma + nota;
            }
            let media = suma / numNotas;
            alert("La nota media es: " + media);
        }
    </script>
    <br>
    <a href="index.html">Volver a inicio</a>
</body>
</html>
