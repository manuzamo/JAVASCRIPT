<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dom y javscript</title>
    <style type="text/css">
        #caja {
           border: 1px solid blue; 
           padding: 20px;
           width: 300px;
        }
    </style>
    <script type="text/javascript">
        function cambiaTitulo() {
            var titulo = document.getElementById("titulo");
            if (titulo.innerHTML == "Título inicial") {
                titulo.innerHTML = " Nuevo título";
            } else {
                titulo.innerHTML = "Título inicial";
            }
            document.getElementById("caja").innerHTML = "Nuevo contenido";
        }
        function cambiaAnchoImagen() {
            var imagen = document.getElementById("imagen");
            imagen.width = imagen.width + 100;
        }
        function cambiaSrc(){
            document.getElementById("imagen").src = "images/quijote.jpg";
        }
        function cambiaCaja() {
            var caja = document.getElementById("caja");
            caja.style.width = "500px";
            caja.style.backgroundColor = "lightgreen";
            caja.style.fontSize = "50px";
            caja.style.color = "red";   
        }

    </script>
</head>
<body>
    <h1 id="titulo">Título inicial</h1>
    <div id="caja">Contenido caja</div>
    <img id="imagen" src="images/molino.jpg" width="200" height="300">
    <br>
    <button onclick="cambiaTitulo()">Cambiar título</button>
    <button onclick="cambiaAnchoImagen()">Cambiar ancho imágen</button>
    <button onclick="cambiaSrc()">Cambiar imágen</button>
    <button onclick="cambiaCaja()">Cambiar caja</button>
    <br>
    <a href="index.html">Volver a inicio</a>
</body>
</html>
